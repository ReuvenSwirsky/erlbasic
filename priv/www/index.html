<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erlang BASIC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #eee;
    }
    header {
      padding: 1rem 2rem;
      width: 100%;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; color: #00d4ff; letter-spacing: 0.05em; }
    header p  { font-size: 0.85rem; color: #aaa; }
    #terminal-container {
      flex: 1;
      width: 100%;
      max-width: 960px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      border: 1px solid #0f3460;
      border-radius: 4px;
      overflow: hidden;
      padding: 4px;
      background: #000;
    }
    #status {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #888;
      text-align: right;
    }
    #status.connected { color: #4caf50; }
    #status.disconnected { color: #f44336; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>&#x1F5A5; Erlang BASIC</h1>
      <p>A time-shared BASIC interpreter — running live in Erlang</p>
    </div>
  </header>

  <div id="terminal-container">
    <div id="terminal"></div>
    <div id="status" class="disconnected">Connecting…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      fontFamily: '"Cascadia Code", "Fira Code", "Courier New", monospace',
      fontSize: 14,
      theme: {
        background: '#000000',
        foreground: '#00ff41',
        cursor:     '#00ff41',
        black:      '#000000',
        brightBlack:'#555555',
      }
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    window.addEventListener('resize', () => fitAddon.fit());

    const statusEl = document.getElementById('status');
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      statusEl.textContent = 'Connected';
      statusEl.className = 'connected';
    };

    ws.onclose = () => {
      statusEl.textContent = 'Disconnected — reload to reconnect';
      statusEl.className = 'disconnected';
      term.writeln('\r\n\x1b[31mConnection closed.\x1b[0m');
    };

    ws.onerror = () => {
      statusEl.textContent = 'Connection error';
      statusEl.className = 'disconnected';
    };

    // Output from the server → display in terminal
    ws.onmessage = (evt) => {
      const data = evt.data;
      // Control frames start with STX (\x02) and are not displayed
      if (data.length > 0 && data.charCodeAt(0) === 2) {
        const cmd = data.slice(1);
        if (cmd === 'PASSWORD_ON')  { passwordMode = true; }
        if (cmd === 'PASSWORD_OFF') { passwordMode = false; }
        if (cmd === 'CHAR_MODE_ON')  { charMode = true; }
        if (cmd === 'CHAR_MODE_OFF') { charMode = false; inputBuffer = ''; }
        return;
      }
      // Normalise \r\n from BASIC to what xterm expects
      term.write(data.replace(/\r\n/g, '\r\n'));
    };

    // Keyboard input.
    // In normal mode: buffer until Enter, then send the whole line.
    // In char mode (GET/GETKEY): send each key immediately as a single character,
    // without echoing or waiting for Enter.
    let inputBuffer  = '';
    let passwordMode = false;
    let charMode     = false;
    term.onKey(({ key, domEvent }) => {
      const code = domEvent.keyCode;

      // Ctrl-C to interrupt (always)
      if (domEvent.ctrlKey && code === 67) {
        term.write('^C');
        ws.send('\x03');
        inputBuffer = '';
        return;
      }

      if (charMode) {
        // In char mode: send the raw character immediately, no echo, no buffering.
        if (key && key.length === 1) {
          ws.send(key + '\n');
        }
        return;
      }

      if (code === 13) {                          // Enter
        term.write('\r\n');
        ws.send(inputBuffer + '\n');
        inputBuffer = '';
      } else if (code === 8) {                    // Backspace
        if (inputBuffer.length > 0) {
          inputBuffer = inputBuffer.slice(0, -1);
          term.write('\b \b');
        }
      } else if (key >= ' ' || code === 9) {     // Printable / Tab
        inputBuffer += key;
        term.write(passwordMode ? '*' : key);
      }
    });
  </script>
</body>
</html>
