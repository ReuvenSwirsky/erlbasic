<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erlang BASIC</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #eee;
    }
    header {
      padding: 1rem 2rem;
      width: 100%;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.4rem; color: #00d4ff; letter-spacing: 0.05em; }
    header p  { font-size: 0.85rem; color: #aaa; }
    #terminal-container {
      flex: 1;
      width: 100%;
      max-width: 960px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #terminal {
      flex: 1;
      border: 1px solid #0f3460;
      border-radius: 4px;
      overflow: hidden;
      padding: 4px;
      background: #000;
      position: relative;
      z-index: 2;
    }
    #graphics-canvas {
      position: absolute;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      bottom: 0;
      width: calc(100% - 2rem);
      height: calc(100% - 1rem);
      border: 1px solid #0f3460;
      border-radius: 4px;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }
    #terminal-container.graphics-mode #terminal {
      z-index: 1;
    }
    #terminal-container.graphics-mode #graphics-canvas {
      z-index: 3;
      opacity: 1;
      /* Keep pointer-events: none so keyboard events pass through to terminal */
    }
    #status {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #888;
      text-align: right;
    }
    #status.connected { color: #4caf50; }
    #status.disconnected { color: #f44336; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>&#x1F5A5; Erlang BASIC</h1>
      <p>A time-shared BASIC interpreter — running live in Erlang</p>
    </div>
  </header>

  <div id="terminal-container">
    <canvas id="graphics-canvas" width="640" height="480"></canvas>
    <div id="terminal"></div>
    <div id="status" class="disconnected">Connecting…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      fontFamily: '"Cascadia Code", "Fira Code", "Courier New", monospace',
      fontSize: 14,
      theme: {
        background: '#000000',
        foreground: '#00ff41',
        cursor:     '#00ff41',
        black:      '#000000',
        brightBlack:'#555555',
      }
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    window.addEventListener('resize', () => fitAddon.fit());

    const statusEl = document.getElementById('status');
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      statusEl.textContent = 'Connected';
      statusEl.className = 'connected';
    };

    ws.onclose = () => {
      stopAllSoundChannels();
      statusEl.textContent = 'Disconnected — reload to reconnect';
      statusEl.className = 'disconnected';
      term.writeln('\r\n\x1b[31mConnection closed.\x1b[0m');
    };

    ws.onerror = () => {
      statusEl.textContent = 'Connection error';
      statusEl.className = 'disconnected';
    };

    // Graphics setup
    const canvas = document.getElementById('graphics-canvas');
    const ctx = canvas.getContext('2d');
    
    // 16-color EGA/VGA palette
    const palette = [
      '#000000', '#0000AA', '#00AA00', '#00AAAA',
      '#AA0000', '#AA00AA', '#AA5500', '#AAAAAA',
      '#555555', '#5555FF', '#55FF55', '#55FFFF',
      '#FF5555', '#FF55FF', '#FFFF55', '#FFFFFF'
    ];
    
    function handleGraphicsCommand(cmd) {
      const parts = cmd.split(':');
      const action = parts[0];
      
      switch(action) {
        case 'HGR':
          document.getElementById('terminal-container').classList.add('graphics-mode');
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, 640, 480);
          break;
          
        case 'TEXT':
          document.getElementById('terminal-container').classList.remove('graphics-mode');
          break;
          
        case 'PSET':
          const x = parseInt(parts[1]);
          const y = parseInt(parts[2]);
          const c = parseInt(parts[3]) & 15;
          ctx.fillStyle = palette[c];
          ctx.fillRect(x, y, 1, 1);
          break;
          
        case 'LINE':
          const x1 = parseInt(parts[1]);
          const y1 = parseInt(parts[2]);
          const x2 = parseInt(parts[3]);
          const y2 = parseInt(parts[4]);
          const lc = parseInt(parts[5]) & 15;
          ctx.strokeStyle = palette[lc];
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          break;
          
        case 'RECT':
          const rx1 = parseInt(parts[1]);
          const ry1 = parseInt(parts[2]);
          const rx2 = parseInt(parts[3]);
          const ry2 = parseInt(parts[4]);
          const rc = parseInt(parts[5]) & 15;
          ctx.fillStyle = palette[rc];
          ctx.fillRect(rx1, ry1, rx2 - rx1 + 1, ry2 - ry1 + 1);
          break;
          
        case 'CIRCLE':
          const cx = parseInt(parts[1]);
          const cy = parseInt(parts[2]);
          const r = parseInt(parts[3]);
          const cc = parseInt(parts[4]) & 15;
          ctx.strokeStyle = palette[cc];
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, 2 * Math.PI);
          ctx.stroke();
          break;
          
        case 'GCLS':
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, 640, 480);
          break;
      }
    }

    // SOUND setup (4 Atari-like channels with pitch/distortion/volume)
    const soundChannels = [null, null, null, null];
    let audioCtx = null;
    let audioUnlockAttempted = false;

    function getAudioCtx() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) {
          return null;
        }
        audioCtx = new Ctx();
      }
      return audioCtx;
    }

    function unlockAudioFromGesture() {
      if (audioUnlockAttempted) {
        return;
      }
      audioUnlockAttempted = true;
      const ctx = getAudioCtx();
      if (!ctx) {
        return;
      }
      if (ctx.state === 'suspended') {
        ctx.resume().catch(() => {
          audioUnlockAttempted = false;
        });
      }
    }

    function stopSoundChannel(channel) {
      const node = soundChannels[channel];
      if (!node) {
        return;
      }
      try { node.osc.stop(); } catch (_) {}
      try { node.osc.disconnect(); } catch (_) {}
      try { node.gain.disconnect(); } catch (_) {}
      soundChannels[channel] = null;
    }

    function stopAllSoundChannels() {
      for (let i = 0; i < soundChannels.length; i += 1) {
        stopSoundChannel(i);
      }
    }

    function mapDistortionToWave(distortion) {
      switch (distortion & 15) {
        case 10:
        case 12:
          return 'square';
        case 8:
          return 'triangle';
        case 14:
          return 'sawtooth';
        default:
          return 'sine';
      }
    }

    function atariPitchToHz(pitch) {
      const p = Math.max(0, Math.min(255, pitch));
      // SOUND pitch is a divisor: larger values mean lower notes.
      const hz = 36000 / (p + 2);
      return Math.max(32, Math.min(2500, hz));
    }

    function handleSoundCommand(cmd) {
      if (cmd === 'STOPALL') {
        stopAllSoundChannels();
        return;
      }
      const parts = cmd.split(':');
      if (parts.length !== 4) {
        return;
      }
      const channel = Math.max(0, Math.min(3, parseInt(parts[0], 10) || 0));
      const pitch = Math.max(0, Math.min(255, parseInt(parts[1], 10) || 0));
      const distortion = Math.max(0, Math.min(15, parseInt(parts[2], 10) || 0));
      const volume = Math.max(0, Math.min(15, parseInt(parts[3], 10) || 0));

      stopSoundChannel(channel);
      if (volume <= 0) {
        return;
      }

      const ctx = getAudioCtx();
      if (!ctx) {
        return;
      }

      if (ctx.state === 'suspended') {
        ctx.resume().catch(() => {});
      }

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = mapDistortionToWave(distortion);
      osc.frequency.value = atariPitchToHz(pitch);
      gain.gain.value = (volume / 15) * 0.08;

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();

      soundChannels[channel] = { osc, gain };
    }
    
    // Output from the server → display in terminal
    ws.onmessage = (evt) => {
      const data = evt.data;
      // Control frames start with STX (\x02) and are not displayed
      if (data.length > 0 && data.charCodeAt(0) === 2) {
        const cmd = data.slice(1);
        if (cmd === 'PASSWORD_ON')  { passwordMode = true; }
        if (cmd === 'PASSWORD_OFF') { passwordMode = false; }
        if (cmd === 'CHAR_MODE_ON')  { charMode = true; }
        if (cmd === 'CHAR_MODE_OFF') { charMode = false; inputBuffer = ''; }
        if (cmd.startsWith('GFX:')) { handleGraphicsCommand(cmd.slice(4)); }
        if (cmd.startsWith('SND:')) { handleSoundCommand(cmd.slice(4)); }
        return;
      }
      // Normalise \r\n from BASIC to what xterm expects
      term.write(data.replace(/\r\n/g, '\r\n'));
    };

    // Keyboard input.
    // In normal mode: buffer until Enter, then send the whole line.
    // In char mode (GET/GETKEY): send each key immediately as a single character,
    // without echoing or waiting for Enter.
    let inputBuffer  = '';
    let passwordMode = false;
    let charMode     = false;
    term.onKey(({ key, domEvent }) => {
      const code = domEvent.keyCode;

      // Browsers may block Web Audio until a user gesture.
      unlockAudioFromGesture();

      // Ctrl-C to interrupt (always)
      if (domEvent.ctrlKey && code === 67) {
        term.write('^C');
        ws.send('\x03');
        stopAllSoundChannels();
        inputBuffer = '';
        // Exit graphics mode if active
        document.getElementById('terminal-container').classList.remove('graphics-mode');
        return;
      }

      if (charMode) {
        // In char mode: send the raw character immediately, no echo, no buffering.
        if (key && key.length === 1) {
          ws.send(key + '\n');
        }
        return;
      }

      if (code === 13) {                          // Enter
        term.write('\r\n');
        ws.send(inputBuffer + '\n');
        inputBuffer = '';
      } else if (code === 8) {                    // Backspace
        if (inputBuffer.length > 0) {
          inputBuffer = inputBuffer.slice(0, -1);
          term.write('\b \b');
        }
      } else if (key >= ' ' || code === 9) {     // Printable / Tab
        inputBuffer += key;
        term.write(passwordMode ? '*' : key);
      }
    });

    // Also unlock on pointer/touch interaction in case keyboard isn't used first.
    window.addEventListener('pointerdown', unlockAudioFromGesture, { passive: true });
    window.addEventListener('touchstart', unlockAudioFromGesture, { passive: true });
  </script>
</body>
</html>
