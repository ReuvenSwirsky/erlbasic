<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErlBASIC Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #1a1a2e;
      --surface: #16213e;
      --border:  #0f3460;
      --accent:  #00d4ff;
      --danger:  #e94560;
      --ok:      #4caf50;
      --text:    #dde;
      --muted:   #888;
      --input-bg:#111827;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.3rem; color: var(--accent); }
    header span { color: var(--muted); font-size: 0.85rem; }

    .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

    /* ---- Login card ---- */
    #login-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      max-width: 420px;
      margin: 3rem auto;
    }
    #login-section h2 { margin-bottom: 1.2rem; color: var(--accent); }

    /* ---- Forms & inputs ---- */
    label { display: block; margin-bottom: 0.3rem; color: var(--muted); font-size: 0.8rem; letter-spacing: .05em; text-transform: uppercase; }
    input, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 0.5rem 0.7rem;
      margin-bottom: 1rem;
      font-size: 14px;
    }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1.2rem;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: .85; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 12px; }

    .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
    .success-msg { color: var(--ok); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

    /* ---- Admin panel ---- */
    #admin-section { display: none; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .card h2 { margin-bottom: 1.2rem; color: var(--accent); font-size: 1rem; letter-spacing: .03em; text-transform: uppercase; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 0.5rem 0.8rem;
      border-bottom: 2px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    td { padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .ppn { font-family: monospace; color: var(--accent); }

    /* ---- Create form ---- */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 0.8rem; }
    .form-actions { display: flex; align-items: center; gap: 1rem; margin-top: 0.4rem; }

    /* ---- Password change modal ---- */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      width: 360px;
    }
    .modal h3 { margin-bottom: 1.2rem; color: var(--accent); }
    .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 0.5rem; }
    .btn-secondary { background: var(--border); color: var(--text); }
  </style>
</head>
<body>

<header>
  <div>
    <h1>&#x1F5A5; ErlBASIC Admin</h1>
    <span>RSTS/E Account Management</span>
  </div>
  <div style="margin-left:auto; display:flex; align-items:center; gap:1rem;">
    <span id="logged-in-as" style="color:var(--muted); font-size:0.85rem;"></span>
    <button class="btn-primary btn-sm" id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
</header>

<!-- ============================================================ -->
<!-- Login section                                                 -->
<!-- ============================================================ -->
<div id="login-section" class="container">
  <h2>Login</h2>
  <p style="color:var(--muted); margin-bottom:1.5rem; font-size:0.85rem;">
    Use a privileged account (Project 0 or 1) to log in.
    Enter your PPN in <code style="color:var(--accent)">Project,Programmer</code> format.
  </p>
  <label for="login-ppn">PPN [Project,Programmer]</label>
  <input id="login-ppn" type="text" autocomplete="username">
  <label for="login-password">Password</label>
  <input id="login-password" type="password" autocomplete="current-password">
  <div class="form-actions">
    <button class="btn-primary" onclick="doLogin()">Login</button>
  </div>
  <div class="error-msg" id="login-error"></div>
</div>

<!-- ============================================================ -->
<!-- Admin panel                                                   -->
<!-- ============================================================ -->
<div id="admin-section" class="container">

  <!-- Accounts table -->
  <div class="card">
    <h2>User Accounts</h2>
    <table id="accounts-table">
      <thead>
        <tr>
          <th>PPN</th>
          <th>Name</th>
          <th>Privilege</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="accounts-body">
        <tr><td colspan="4" style="color:var(--muted)">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Create account -->
  <div class="card">
    <h2>Create Account</h2>
    <div class="form-row">
      <div>
        <label for="new-project">Project (0–254)</label>
        <input id="new-project" type="number" min="0" max="254" placeholder="2">
      </div>
      <div>
        <label for="new-programmer">Programmer (0–254)</label>
        <input id="new-programmer" type="number" min="0" max="254" placeholder="1">
      </div>
    </div>
    <label for="new-name">Display Name</label>
    <input id="new-name" type="text" placeholder="Jane Smith">
    <label for="new-password">Password</label>
    <input id="new-password" type="password" placeholder="••••••••">
    <div class="form-actions">
      <button class="btn-primary" onclick="createAccount()">Create Account</button>
      <div class="error-msg" id="create-error"></div>
      <div class="success-msg" id="create-ok"></div>
    </div>
  </div>

</div>

<!-- ============================================================ -->
<!-- Change-password modal                                         -->
<!-- ============================================================ -->
<div class="modal-backdrop" id="pw-modal">
  <div class="modal">
    <h3>Change Password</h3>
    <p id="pw-modal-label" style="margin-bottom:1rem; color:var(--muted); font-size:0.85rem;"></p>
    <label>New Password</label>
    <input id="pw-modal-input" type="password">
    <label style="margin-top:0.75rem;">Confirm Password</label>
    <input id="pw-modal-confirm" type="password">
    <div class="warn-msg" id="pw-modal-warn" style="display:none; color:#f0a500; font-size:0.8rem; margin-top:0.4rem;"></div>
    <div class="error-msg" id="pw-modal-error"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closePwModal()">Cancel</button>
      <button class="btn-primary" onclick="submitPwChange()">Save</button>
    </div>
  </div>
</div>

<script>
  // -----------------------------------------------------------
  // State
  // -----------------------------------------------------------
  let authHeader = null;   // "Basic ..."  set after successful login
  let pwTarget   = null;   // {project, programmer}

  // -----------------------------------------------------------
  // Login
  // -----------------------------------------------------------
  async function doLogin() {
    const ppn      = document.getElementById('login-ppn').value.trim();
    const password = document.getElementById('login-password').value;
    const header   = 'Basic ' + btoa(ppn + ':' + password);

    const resp = await fetch('/admin/users', {
      headers: { Authorization: header }
    });

    if (resp.ok) {
      authHeader = header;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('admin-section').style.display = 'block';
      document.getElementById('logged-in-as').textContent = 'Logged in as [' + ppn + ']';
      document.getElementById('logout-btn').style.display = '';
      await loadAccounts();
    } else if (resp.status === 401) {
      document.getElementById('login-error').textContent =
        'Invalid credentials or account is not privileged.';
    } else {
      document.getElementById('login-error').textContent =
        'Server error (' + resp.status + '). Try again.';
    }
  }

  function logout() {
    authHeader = null;
    document.getElementById('login-section').style.display = '';
    document.getElementById('admin-section').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('logged-in-as').textContent = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').textContent = '';
  }

  // Allow Enter key to submit login
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // -----------------------------------------------------------
  // Load accounts
  // -----------------------------------------------------------
  async function loadAccounts() {
    const resp    = await fetch('/admin/users', { headers: { Authorization: authHeader } });
    const accounts = await resp.json();
    const tbody   = document.getElementById('accounts-body');
    tbody.innerHTML = '';

    if (accounts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted)">No accounts.</td></tr>';
      return;
    }

    accounts.forEach(a => {
      const ppn  = a.project + ',' + a.programmer;
      const priv = (a.project === 0 || a.project === 1) ? '&#x1F512; Privileged' : 'User';
      const tr   = document.createElement('tr');
      tr.innerHTML = `
        <td class="ppn">[${ppn}]</td>
        <td>${escapeHtml(a.name)}</td>
        <td>${priv}</td>
        <td>
          <button class="btn-primary btn-sm"
            onclick="openPwModal(${a.project}, ${a.programmer})">
            Change Password
          </button>
          &nbsp;
          <button class="btn-danger btn-sm"
            onclick="deleteAccount(${a.project}, ${a.programmer})">
            Delete
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  // -----------------------------------------------------------
  // Create account
  // -----------------------------------------------------------
  async function createAccount() {
    document.getElementById('create-error').textContent = '';
    document.getElementById('create-ok').textContent   = '';

    const project    = document.getElementById('new-project').value.trim();
    const programmer = document.getElementById('new-programmer').value.trim();
    const name       = document.getElementById('new-name').value.trim();
    const password   = document.getElementById('new-password').value;

    if (!project || !programmer || !password) {
      document.getElementById('create-error').textContent =
        'Project, programmer and password are required.';
      return;
    }

    const body = new URLSearchParams({ project, programmer, password, name });
    const resp = await fetch('/admin/users', {
      method: 'POST',
      headers: { Authorization: authHeader, 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });

    if (resp.ok) {
      document.getElementById('create-ok').textContent = 'Account created.';
      document.getElementById('new-project').value    = '';
      document.getElementById('new-programmer').value = '';
      document.getElementById('new-name').value       = '';
      document.getElementById('new-password').value   = '';
      await loadAccounts();
    } else {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      document.getElementById('create-error').textContent = err.error || 'Error creating account.';
    }
  }

  // -----------------------------------------------------------
  // Delete account
  // -----------------------------------------------------------
  async function deleteAccount(project, programmer) {
    if (!confirm(`Delete account [${project},${programmer}]?`)) return;
    const resp = await fetch(`/admin/users/${project}/${programmer}`, {
      method: 'DELETE',
      headers: { Authorization: authHeader }
    });
    if (resp.ok) {
      await loadAccounts();
    } else {
      alert('Error deleting account: ' + resp.status);
    }
  }

  // -----------------------------------------------------------
  // Change password modal
  // -----------------------------------------------------------
  function openPwModal(project, programmer) {
    pwTarget = { project, programmer };
    document.getElementById('pw-modal-label').textContent =
      'Changing password for account [' + project + ',' + programmer + ']';
    document.getElementById('pw-modal-input').value   = '';
    document.getElementById('pw-modal-confirm').value = '';
    document.getElementById('pw-modal-error').textContent = '';
    document.getElementById('pw-modal-warn').style.display = 'none';
    document.getElementById('pw-modal-warn').textContent   = '';
    document.getElementById('pw-modal').classList.add('open');
    document.getElementById('pw-modal-input').focus();
  }

  function closePwModal() {
    document.getElementById('pw-modal').classList.remove('open');
    pwTarget = null;
  }

  // Returns a warning string if the password contains characters not on an
  // ASR-33 teletype keyboard, or an empty string if all characters are fine.
  // The ASR-33 supports the 64-character upper-case ASCII subset: space plus
  // codes 0x21-0x5F (! through _).  Lowercase input is accepted (it will be
  // uppercased before hashing) but anything outside 0x20-0x5F after uppercasing
  // is outside the ASR-33 character set.
  function asr33Warning(password) {
    const upper = password.toUpperCase();
    const bad = [...upper].filter(ch => {
      const c = ch.charCodeAt(0);
      return c < 0x20 || c > 0x5F;
    });
    if (bad.length === 0) return '';
    const unique = [...new Set(bad)].join(' ');
    return 'Warning: the following characters are not on an ASR-33 teletype keyboard and may cause compatibility issues: ' + unique;
  }

  // Live ASR-33 warning as the user types
  ['pw-modal-input', 'pw-modal-confirm'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      const pw1  = document.getElementById('pw-modal-input').value;
      const pw2  = document.getElementById('pw-modal-confirm').value;
      const warn = asr33Warning(pw1) || asr33Warning(pw2);
      const el   = document.getElementById('pw-modal-warn');
      if (warn) {
        el.textContent    = warn;
        el.style.display  = '';
      } else {
        el.style.display  = 'none';
        el.textContent    = '';
      }
    });
  });

  async function submitPwChange() {
    const password = document.getElementById('pw-modal-input').value;
    const confirm  = document.getElementById('pw-modal-confirm').value;
    const errEl    = document.getElementById('pw-modal-error');

    if (!password) {
      errEl.textContent = 'Password cannot be empty.';
      return;
    }
    // Case-insensitive match (passwords are uppercased before hashing)
    if (password.toUpperCase() !== confirm.toUpperCase()) {
      errEl.textContent = 'Passwords do not match.';
      return;
    }
    errEl.textContent = '';

    const { project, programmer } = pwTarget;
    const body = new URLSearchParams({ password });
    const resp = await fetch(`/admin/users/${project}/${programmer}`, {
      method: 'PUT',
      headers: { Authorization: authHeader, 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });
    if (resp.ok) {
      closePwModal();
    } else {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      errEl.textContent = err.error || 'Error updating password.';
    }
  }

  // Close modal on backdrop click
  document.getElementById('pw-modal').addEventListener('click', function(e) {
    if (e.target === this) closePwModal();
  });

  // -----------------------------------------------------------
  // Helpers
  // -----------------------------------------------------------
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
